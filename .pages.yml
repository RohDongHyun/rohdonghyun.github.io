# Pages CMS 설정 — https://pagescms.org/docs
#
# 목적: velog처럼 "웹에서 글 편집 + 이미지 붙여넣기 업로드". 저장하면 main에 직접 커밋되고
#       GitHub Actions가 바로 배포 → 글이 즉시 웹에 노출된다(초안/draft 단계 없음).
#
# 사용법:
#   1) https://app.pagescms.org 에 GitHub 계정으로 로그인
#   2) Pages CMS GitHub App을 이 repo(rohdonghyun.github.io)에 설치/승인
#   3) 대시보드에서 repo를 열면 카테고리별 컬렉션이 보인다
#   4) 글을 저장 → 자동 커밋 → 자동 배포
#
# 파일명(슬러그): 글 생성 시 "파일명" 입력란이 날짜+제목 기반 기본값으로 채워진다.
#   영문 슬러그 컨벤션을 지키려면 이 기본값을 영문 kebab-case로 고치면 된다
#   (예: 2026-06-14-llm-agent-trends.md). 별도 슬러그 필드는 없앴다.
#
# 주의(중요): 본문(body)은 rich-text(WYSIWYG, TipTap). 이미지 붙여넣기는 여기서 동작하지만,
#   KaTeX 수식($...$ / $$...$$)과 위키링크([[...]])를 변형/이스케이프할 수 있다. 수식·링크가
#   많은 글은 저장 후 결과 .md를 확인할 것. 깨지면 body를 type: code(raw markdown)로 바꾸는
#   대안이 있다(이미지 붙여넣기는 포기, 미디어 매니저로 수동 삽입).

media:
  input: content/images   # 업로드된 이미지가 저장되는 repo 경로
  output: /images         # 본문에 박히는 공개 URL 경로 (Quartz가 content/images/* 를 /images/* 로 서빙)

content:
  - name: posts-insights
    label: "insights (세미나·기사·신지식)"
    type: collection
    path: content/posts/insights
    format: yaml-frontmatter
    filename: { template: "{year}-{month}-{day}-{primary}.md", field: create }
    exclude: ["index.md"]
    view: { primary: title, sort: [date], default: { sort: date, order: desc } }
    # NOTE: fields는 세 컬렉션에 동일하게 펼쳐 둔다. YAML 앵커(*alias)는 Pages CMS 설정
    #       검증기가 못 펼쳐 "items must be an array of content entries" 에러를 내므로 쓰지 않는다.
    fields:
      - { name: title, label: 제목, type: string, required: true }
      - { name: date, label: 날짜, type: date, required: true, options: { format: "yyyy-MM-dd" } }
      - name: tags
        label: "태그 (자유 입력, 1개 이상 / 예: AI Scheduling, AI Agent)"
        type: string
        list: { min: 1 }   # 자유 입력 태그(값 제약 없음, 최소 1개). select는 creatable 미지원이라 string-list로 둔다.
      - { name: private, label: 비공개(암호화), type: boolean, default: false }
      - { name: body, label: 본문, type: rich-text }

  - name: posts-foundations
    label: "foundations (학술 기초 지식)"
    type: collection
    path: content/posts/foundations
    format: yaml-frontmatter
    filename: { template: "{year}-{month}-{day}-{primary}.md", field: create }
    exclude: ["index.md"]
    view: { primary: title, sort: [date], default: { sort: date, order: desc } }
    fields:
      - { name: title, label: 제목, type: string, required: true }
      - { name: date, label: 날짜, type: date, required: true, options: { format: "yyyy-MM-dd" } }
      - name: tags
        label: "태그 (자유 입력, 1개 이상 / 예: AI Scheduling, AI Agent)"
        type: string
        list: { min: 1 }
      - { name: private, label: 비공개(암호화), type: boolean, default: false }
      - { name: body, label: 본문, type: rich-text }

  - name: posts-papers
    label: "papers (논문 요약)"
    type: collection
    path: content/posts/papers
    format: yaml-frontmatter
    filename: { template: "{year}-{month}-{day}-{primary}.md", field: create }
    exclude: ["index.md"]
    view: { primary: title, sort: [date], default: { sort: date, order: desc } }
    fields:
      - { name: title, label: 제목, type: string, required: true }
      - { name: date, label: 날짜, type: date, required: true, options: { format: "yyyy-MM-dd" } }
      - name: tags
        label: "태그 (자유 입력, 1개 이상 / 예: AI Scheduling, AI Agent)"
        type: string
        list: { min: 1 }
      - { name: private, label: 비공개(암호화), type: boolean, default: false }
      - { name: body, label: 본문, type: rich-text }
